<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Signup - Chakra Gyaan</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <div class="auth-container">
    <div class="auth-left">
      <img src="images/logo.png" alt="Chakra Gyaan Logo" class="auth-logo" />
      <h1>Chakra Gyaan</h1>
      <p>Astrology • Wellness • Spirituality</p>
      <span class="auth-tagline">
        Discover guidance, clarity, and healing through spiritual consultations.
      </span>
    </div>

    <div class="auth-right">
      <div class="form-box">
        <div class="form-toggle">
          <button class="toggle-btn active" id="loginTab">Login</button>
          <button class="toggle-btn" id="signupTab">Signup</button>
        </div>

        <form id="loginForm" class="auth-form active-form">
          <h2>Welcome Back</h2>

          <div class="input-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="Enter your email" required />
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password" required />
          </div>

          <div class="auth-options">
            <label class="remember-me">
              <input type="checkbox" />
              Remember me
            </label>
            <a href="#" class="forgot-link">Forgot Password?</a>
          </div>

          <button type="submit" class="btn auth-btn">Login</button>
          <p class="form-switch-text">
            Don’t have an account?
            <span id="goSignup">Signup here</span>
          </p>
        </form>

        <form id="signupForm" class="auth-form">
          <h2>Create Account</h2>

          <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="signupName" placeholder="Enter your full name" required />
          </div>

          <div class="input-group">
            <label>Email</label>
            <input type="email" id="signupEmail" placeholder="Enter your email" required />
          </div>

          <div class="input-group">
            <label>Mobile Number</label>
            <input type="tel" id="signupMobile" placeholder="Enter your mobile number" required />
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Create password" required />
          </div>

          <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="signupConfirmPassword" placeholder="Confirm password" required />
          </div>

          <button type="submit" class="btn auth-btn">Signup</button>
          <p class="form-switch-text">
            Already have an account?
            <span id="goLogin">Login here</span>
          </p>
        </form>

        <p id="authMessage" class="auth-message"></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
